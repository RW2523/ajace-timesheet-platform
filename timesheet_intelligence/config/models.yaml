# ============================================================================
# Model routing table.
#
# COST-SAVING MODE: openai/gpt-4o-mini is the ONLY model on every task (no
# gemini). gpt-4o-mini is dramatically cheaper; accuracy on dense/handwritten
# tables is lower than gemini-2.5-pro, but cost is the priority here.
# Swap any task by editing the candidate list or setting TSE_MODEL_<TASK>.
# Nothing is hardcoded in code -- the engine asks for a *task*, never a model.
# ============================================================================

defaults:
  temperature: 0.0
  max_tokens: 8192
  response_format_json: true

tasks:
  classify:
    candidates:
      - openai/gpt-4o-mini
    max_tokens: 2048

  vision:
    candidates:
      - openai/gpt-4o-mini
    max_tokens: 12000

  table:
    candidates:
      - openai/gpt-4o-mini
    max_tokens: 12000

  normalize:
    candidates:
      - openai/gpt-4o-mini
    max_tokens: 12000

  validate:
    candidates:
      - openai/gpt-4o-mini
    max_tokens: 4096
