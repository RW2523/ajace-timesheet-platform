<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Timesheet Intelligence</title>
  <link rel="stylesheet" href="styles.css?v=6" />
</head>
<body>
  <header>
    <div class="brand">
      <h1>🗓️ Timesheet Intelligence</h1>
      <span class="tag">Core Engine · multi-format · audited</span>
    </div>
    <div class="controls">
      <label>Folder
        <input id="folder" class="folder" placeholder="/path/to/Timesheet" />
      </label>
      <label>Month
        <select id="month">
          <option value="1">Jan</option><option value="2">Feb</option>
          <option value="3">Mar</option><option value="4" selected>Apr</option>
          <option value="5">May</option><option value="6">Jun</option>
          <option value="7">Jul</option><option value="8">Aug</option>
          <option value="9">Sep</option><option value="10">Oct</option>
          <option value="11">Nov</option><option value="12">Dec</option>
        </select>
      </label>
      <label>Year <input id="year" type="number" value="2026" style="width:90px" /></label>
      <button class="primary" id="run">Process</button>
      <span id="status" class="tag"></span>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="stats">
        <h3>Run summary</h3>
        <div id="summary"><div class="stat-row"><span>No report</span><b>—</b></div></div>
      </div>
      <div class="emplist">
        <h3>Employees</h3>
        <div id="employees"></div>
      </div>
    </aside>

    <main class="main" id="main">
      <div id="detail">
        <div class="empty-state">
          Enter a folder, pick a month/year, and press <b>Process</b>.<br/>
          Or this view loads the most recent report automatically.
        </div>
      </div>
      <div id="preview-pane" class="hidden">
        <div class="pv-bar">
          <select id="pv-file" title="source file"></select>
          <span class="pv-zoom">
            <button id="pv-zoom-out" title="zoom out">−</button>
            <span id="pv-zoom-lvl">100%</span>
            <button id="pv-zoom-in" title="zoom in">+</button>
            <button id="pv-zoom-fit" title="fit to width">⤢</button>
          </span>
          <span class="pv-actions">
            <a id="pv-open" target="_blank" class="src-link">open ↗</a>
            <button id="pv-close" class="close" title="close preview">×</button>
          </span>
        </div>
        <div id="pv-frame" title="source preview"></div>
      </div>
    </main>
  </div>

  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <div class="mhead"><h3 id="modal-title">Detail</h3><button class="close" id="modal-close">×</button></div>
      <div class="mbody" id="modal-body"></div>
    </div>
  </div>

  <script src="app.js?v=6"></script>
</body>
</html>
